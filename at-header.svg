  <path d="M 30 150 L 70 150 L 90 130 L 140 130 L 160 110 L 200 110" fill="none" stroke="#58A6FF" stroke-width="1.2" opacity="0.3" />
  <circle cx="30" cy="150" r="2" fill="#58A6FF" opacity="0.4" />
