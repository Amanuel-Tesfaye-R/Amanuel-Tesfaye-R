  <circle cx="770" cy="65" r="2" fill="#00bcd4" opacity="0.4" />

  <rect x="315" y="40" width="170" height="2" fill="url(#accent)" opacity="0.3" rx="1" />

  <text x="400" y="72" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="36" font-weight="700" fill="#F0F6FC" text-anchor="middle" letter-spacing="3">
