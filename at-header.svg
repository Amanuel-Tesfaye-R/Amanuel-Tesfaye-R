  <line x1="310" y1="118" x2="490" y2="118" stroke="url(#accent)" stroke-width="1" opacity="0.5" />

  <text x="400" y="145" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#484F58" text-anchor="middle" letter-spacing="2.5">
