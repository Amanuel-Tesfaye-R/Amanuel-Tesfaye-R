<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="100%" stop-color="#00bcd4" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" fill="#0D1117" rx="8" />

  <!-- Subtle dot grid -->
  <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="0.8" fill="#1E2D3D" />
  </pattern>
  <rect width="800" height="180" fill="url(#dotGrid)" />

  <!-- Left: embedded circuit path -->
  <path d="M 30 150 L 70 150 L 90 130 L 140 130 L 160 110 L 200 110" fill="none" stroke="#58A6FF" stroke-width="1.2" opacity="0.3" />
  <circle cx="30" cy="150" r="2" fill="#58A6FF" opacity="0.4" />
  <circle cx="200" cy="110" r="2" fill="#58A6FF" opacity="0.4" />

  <!-- Right: financial chart line -->
  <path d="M 600 120 L 630 105 L 660 112 L 690 85 L 720 95 L 750 60 L 770 65" fill="none" stroke="#00bcd4" stroke-width="1.2" opacity="0.3" />
  <circle cx="600" cy="120" r="2" fill="#00bcd4" opacity="0.4" />
  <circle cx="770" cy="65" r="2" fill="#00bcd4" opacity="0.4" />

  <!-- Top accent bar -->
  <rect x="355" y="40" width="90" height="2" fill="url(#accent)" opacity="0.3" rx="1" />

  <!-- Name -->
  <text x="400" y="82" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="46" font-weight="700" fill="#F0F6FC" text-anchor="middle" letter-spacing="2">
    Aman
  </text>

  <!-- Divider -->
  <line x1="345" y1="97" x2="455" y2="97" stroke="url(#accent)" stroke-width="1.5" />

  <!-- Tagline -->
  <text x="400" y="125" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#8B949E" text-anchor="middle" letter-spacing="4">
    BUILDING AT THE INTERSECTION
  </text>

  <!-- Location -->
  <text x="400" y="150" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="10" fill="#484F58" text-anchor="middle" letter-spacing="3">
    ADDIS ABABA, ETHIOPIA
  </text>
</svg>
