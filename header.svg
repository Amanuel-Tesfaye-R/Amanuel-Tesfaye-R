<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="100%" stop-color="#00bcd4" />
    </linearGradient>
    <linearGradient id="markBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151D2E" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="800" height="200" fill="#0D1117" rx="12" />

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="799" height="199" fill="none" stroke="#1E2D3D" stroke-width="1" rx="12" />

  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="0.5" fill="#1A2538" />
  </pattern>
  <rect width="800" height="200" fill="url(#dots)" rx="12" />

  <!-- ===== LEFT PANEL: Monogram mark ===== -->
  <rect x="12" y="12" width="196" height="176" fill="url(#markBg)" rx="8" />
  <rect x="12.5" y="12.5" width="195" height="175" fill="none" stroke="#58A6FF" stroke-width="0.5" opacity="0.15" rx="8" />

  <!-- Circuit frame top-left -->
  <circle cx="28" cy="28" r="2.5" fill="#58A6FF" opacity="0.35" />
  <path d="M 30.5 28 L 50 28 L 50 45" fill="none" stroke="#58A6FF" stroke-width="1" opacity="0.2" />
  <circle cx="50" cy="45" r="1.5" fill="#58A6FF" opacity="0.2" />

  <!-- Circuit frame bottom-right -->
  <circle cx="192" cy="172" r="2.5" fill="#00bcd4" opacity="0.35" />
  <path d="M 189.5 172 L 170 172 L 170 155" fill="none" stroke="#00bcd4" stroke-width="1" opacity="0.2" />
  <circle cx="170" cy="155" r="1.5" fill="#00bcd4" opacity="0.2" />

  <!-- Monogram "A" -->
  <text x="110" y="118" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="80" font-weight="700" fill="#F0F6FC" text-anchor="middle">
    A
  </text>

  <!-- Accent dot below the A -->
  <circle cx="110" cy="138" r="2" fill="url(#accent)" />

  <!-- ===== DIVIDER ===== -->
  <line x1="220" y1="12" x2="220" y2="188" stroke="#1E2D3D" stroke-width="1" />

  <!-- ===== RIGHT PANEL: Info ===== -->

  <!-- First name -->
  <text x="250" y="72" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="36" font-weight="700" fill="#F0F6FC" letter-spacing="3">
    AMANUEL
  </text>

  <!-- Last name -->
  <text x="250" y="102" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="30" font-weight="400" fill="#8B949E" letter-spacing="2">
    TESFAYE
  </text>

  <!-- Nickname -->
  <text x="250" y="122" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#484F58" letter-spacing="1.5">
    aman
  </text>

  <!-- Divider line -->
  <line x1="250" y1="138" x2="540" y2="138" stroke="url(#accent)" stroke-width="1" opacity="0.4" />

  <!-- Tagline -->
  <text x="250" y="160" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#484F58" letter-spacing="2">
    building at the intersection
  </text>

  <!-- Bottom-right corner signature node -->
  <circle cx="775" cy="185" r="1.5" fill="#00bcd4" opacity="0.3" />
</svg>
